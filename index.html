<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/education.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examsy-Online Exam Portal</title>

    <style>
        body { margin: 0; background-color: #09090b; } /* Examsy dark theme background */
        .examsy-initial-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .examsy-spinner {
            animation: spin 3s linear infinite;
            color: #4f46e5; /* Examsy Primary Purple */
        }
        .examsy-text {
            color: #ffffff;
            margin-top: 24px;
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
<div id="root">

    <div class="examsy-initial-loader">
        <svg class="examsy-spinner" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        </svg>
        <div class="examsy-text">Loading Examsy...</div>
    </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
